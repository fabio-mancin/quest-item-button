name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  busted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v4

      - run: luarocks install busted

      - run: busted spec/
